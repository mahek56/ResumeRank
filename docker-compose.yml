# ============================================================
# ResumeRank — Docker Compose (local development)
# Usage: docker compose up -d
# ============================================================

services:
  # --- PostgreSQL ---
  db:
    image: postgres:16-alpine
    container_name: resumerank-db
    environment:
      POSTGRES_DB: resumerank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- FastAPI AI Service ---
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: resumerank-ai
    environment:
      AI_SERVICE_PORT: "8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # --- Spring Boot Backend ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resumerank-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/resumerank
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      AI_SERVICE_URL: http://ai-service:8000
      JWT_SECRET: dev-only-change-me-in-production-64-chars-minimum-for-hs512-alg
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy

volumes:
  pgdata:
