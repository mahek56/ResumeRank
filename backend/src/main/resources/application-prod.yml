# ============================================================
# ResumeRank — Production profile overrides
# Activate with: SPRING_PROFILES_ACTIVE=prod
# ============================================================

spring:
  datasource:
    url: ${DATABASE_URL}
    hikari:
      maximum-pool-size: 5
      connection-timeout: 60000          # Wait up to 60s for Neon to wake up
      initialization-fail-timeout: 60000 # Wait/retry up to 60s during startup

  jpa:
    show-sql: false

  flyway:
    baseline-on-migrate: false
    connect-retries: 10                  # Allow Flyway to retry connecting
    connect-retries-interval: 5          # Wait 5 seconds between retries (total 50s)

server:
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

# Production: JWT cookie must be Secure (HTTPS only)
app:
  jwt:
    cookie-secure: true

logging:
  level:
    com.resumerank: INFO
    org.springframework.security: WARN
