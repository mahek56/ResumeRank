# ============================================================
# ResumeRank — Dev profile overrides
# Activate with: SPRING_PROFILES_ACTIVE=dev
# ============================================================

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:resumerank}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    show-sql: true

logging:
  level:
    com.resumerank: DEBUG
    org.hibernate.SQL: DEBUG
