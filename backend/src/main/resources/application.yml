# ============================================================
# ResumeRank — Common application config
# Profile-specific overrides in application-dev.yml / application-prod.yml
# ============================================================

spring:
  application:
    name: resumerank-backend

  # --- JPA ---
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate  # Flyway manages schema, Hibernate only validates
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true

  # --- Flyway ---
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # --- File upload limits ---
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

# --- Server ---
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# --- App-specific ---
app:
  jwt:
    secret: ${JWT_SECRET:dev-only-change-me-in-production-64-chars-minimum-for-hs512-alg}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    cookie-name: resumerank_token
    cookie-secure: ${JWT_COOKIE_SECURE:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8000}
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}
  security:
    bcrypt-strength: ${BCRYPT_STRENGTH:12}

# --- Logging ---
logging:
  level:
    com.resumerank: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
